<script>
// ===== CONFIG =====
const C={W:80,H:60,T:21,WW:0,HH:0};
const G={
  m:5e3,lv:1,xp:0,xn:100,hp:100,en:100,me:100,
  px:54,py:40,spd:2.2,fr:0,
  k:{},dpd:null,proj:null,pgs:0,fld:0,
  sk:1,fc:0,cr:0,td:[],d:1,
  npcI:null,dlg:null,hd:0,
  score:0,scoreRate:1,scoreMul:1,stepSfx:0,
  mode:'topdown',angle:Math.PI/2,showCtrl:1,
  shootT:0,devMode:false,devTimer:0,devLinePos:null,
};
const ITEMS=[
  {n:'KOPI',p:8e3,c:'â˜•',d:'+20 âš¡'},
  {n:'BENTO',p:15e3,c:'ðŸ±',d:'+30 â¤ï¸ +10 âš¡'},
  {n:'RAMEN',p:18e3,c:'ðŸœ',d:'+25 â¤ï¸'},
  {n:'MILK TEA',p:1e4,c:'ðŸ§‹',d:'+15 âš¡'},
  {n:'PISAU SAKURA',p:25e3,c:'ðŸŒ¸',d:'Skill +2'},
  {n:'LAPTOP PRO',p:1e6,c:'ðŸ’»',d:'+50% Speed'},
  {n:'MONITOR 4K',p:5e5,c:'ðŸ–¥ï¸',d:'+30% XP'},
];
const PROJ=[
  {n:'To-Do App',xp:30,pay:8e3,t:10,r:1},
  {n:'Blog Engine',xp:60,pay:20e3,t:20,r:2},
  {n:'E-Commerce',xp:120,pay:50e3,t:35,r:3},
  {n:'SaaS Dashboard',xp:200,pay:100e3,t:50,r:4},
  {n:'Game Engine',xp:350,pay:250e3,t:75,r:5},
  {n:'AI Assistant',xp:500,pay:500e3,t:100,r:6}
];
// ===== CANVAS =====
const ca=document.getElementById('gc'),cx=ca.getContext('2d');
function resize(){
  const r=2;
  C.WW=Math.ceil(innerWidth/r);C.HH=Math.ceil(innerHeight/r);
  ca.width=C.WW;ca.height=C.HH;
  ca.style.width=innerWidth+'px';ca.style.height=innerHeight+'px';
}
// ===== COLORS =====
const NEON={
  sky:[10,5,25],grass:[20,80,35],grassD:[15,60,25],
  path:[200,170,100],sand:[255,235,160],water:[40,160,255],
  waterD:[20,100,200],mt:[90,70,200],mtD:[60,40,160],
  road:[90,85,80],roof:[60,50,45],
  tree:[40,220,50],treeD:[20,170,30],
  sakura:[255,180,220],gold:[255,200,60],
  compink:[255,60,140],conblue:[60,200,255],
  purple:[180,80,255],orange:[255,140,40],
};
function C2(r,g,b){return `rgb(${r|0},${g|0},${b|0})`}
function CA(a){return `rgba(0,0,0,${a})`}
let noiseCanvas=null;
function getNoisePattern(){
  if(!noiseCanvas){
    noiseCanvas=document.createElement('canvas');
    noiseCanvas.width=128;noiseCanvas.height=128;
    const nctx=noiseCanvas.getContext('2d');
    const imgData=nctx.createImageData(128,128);
    const data=imgData.data;
    for(let i=0;i<data.length;i+=4){
      const val=Math.random()*255;
      data[i]=val;data[i+1]=val;data[i+2]=val;
      data[i+3]=16;
    }
    nctx.putImageData(imgData,0,0);
  }
  return noiseCanvas;
}
// ===== MAP =====
const MAP=[];
function genMap(){
  // Road grid
  const hRoads=[10,18,26,34,42];
  const vRoads=[10,20,30,40,50,60,70];
  for(let y=0;y<C.H;y++){
    MAP[y]=[];
    for(let x=0;x<C.W;x++){
      let t=0; // default grass
      // Mountains at top
      if(y<5) t=4;
      else if(y<7){
        if(x>36&&x<44) t=5; // mountain pass
        else t=4;
      }
      // Beach / coast at bottom
      else if(y>=55) t=2;
      // River (sungai) flowing east-west
      else if(y>=51&&y<55) t=3;
      // Rice fields (sawah) above river
      else if(y>=43&&y<51) t=7;
      // Road grid in town area
      else if(hRoads.includes(y)||vRoads.includes(x)) t=5;
      // Small hill northwest
      else if(x<8&&y<16) t=4;
      // Small pond southeast
      else if(x>72&&y>36&&y<43) t=3;
      // Forest patches
      else if(x>72&&y<16) t=4;
      // Sandy patch near river
      else if(y>=42&&y<44&&x>60&&x<70) t=2;
      MAP[y][x]=t;
    }
  }
}
function isWall(x,y){
  const t=MAP[y]?.[x];
  return t===3||t===4||t===6;
}
function getBld(x,y){
  for(const b of BLD)if(x>=b.x&&x<b.x+b.w&&y>=b.y&&y<b.y+b.h)return b;
  return null;
}
// ===== FPS RAYCASTER =====
function castRay(angle){
  const dirX=Math.cos(angle),dirY=Math.sin(angle);
  let mx=Math.floor(G.px),my=Math.floor(G.py);
  const dx=Math.abs(1/dirX),dy=Math.abs(1/dirY);
  let sx,sy,sdx,sdy;
  if(dirX<0){sx=-1;sdx=(G.px-mx)*dx;}else{sx=1;sdx=(mx+1-G.px)*dx;}
  if(dirY<0){sy=-1;sdy=(G.py-my)*dy;}else{sy=1;sdy=(my+1-G.py)*dy;}
  let hit=0,side=0;
  while(!hit&&mx>=0&&mx<C.W&&my>=0&&my<C.H){
    if(sdx<sdy){sdx+=dx;mx+=sx;side=0;}
    else{sdy+=dy;my+=sy;side=1;}
    if(isWall(mx,my))hit=1;
  }
  if(!hit)return null;
  const dist=side===0?(mx-G.px+(1-sx)/2)/dirX:(my-G.py+(1-sy)/2)/dirY;
  const tile=MAP[my]?.[mx]??0;
  const bld=getBld(mx,my);
  const wx=side===0?mx+(1-sx)/2:G.px+dist*dirX;
  const wy=side===0?G.py+dist*dirY:my+(1-sy)/2;
  return{dist,side,tile,mx,my,bld,wx,wy};
}
// ===== FIXED DECORATIONS (no glitching) =====
const TREES=[];
const SAKURA=[];
function genDecor(){
  for(let i=0;i<30;i++){
    let tx,ty,ok;
    for(let a=0;a<20;a++){
      tx=2+Math.random()*(C.W-4)|0;ty=2+Math.random()*(C.H-4)|0;
      ok=true;
      if(Math.abs(tx-40)<6&&Math.abs(ty-30)<6)ok=false;
      if(isWall(tx,ty))ok=false;
      BLD.forEach(b=> {if(tx>=b.x&&tx<b.x+b.w&&ty>=b.y&&ty<b.y+b.h)ok=false;});
      if(ok)break;
    }
    if(ok)TREES.push({x:tx,y:ty});
  }
  for(let i=0;i<12;i++){
    let tx,ty,ok;
    for(let a=0;a<20;a++){
      tx=2+Math.random()*30|0;ty=2+Math.random()*30|0;
      ok=true;
      if(Math.abs(tx-40)<6&&Math.abs(ty-30)<6)ok=false;
      if(isWall(tx,ty))ok=false;
      BLD.forEach(b=> {if(tx>=b.x&&tx<b.x+b.w&&ty>=b.y&&ty<b.y+b.h)ok=false;});
      if(ok)break;
    }
    if(ok)SAKURA.push({x:tx,y:ty});
  }
}
// ===== BUILDINGS =====
const BLD=[];
function addB(x,y,w,h,c,n,fn){
  BLD.push({x,y,w,h,c,c2:[c[0]*.6|0,c[1]*.6|0,c[2]*.6|0],n,fn});
}
function markBldMap(){
  BLD.forEach(b=> {
    for(let by=b.y;by<b.y+b.h;by++)for(let bx=b.x;bx<b.x+b.w;bx++){
      if(by>=0&&by<C.H&&bx>=0&&bx<C.W)MAP[by][bx]=6;
    }
  });
}
function initBld(){
  // === COMMERCIAL (along main roads) ===
  addB(32,19,6,4,[120,60,30],'WARKOP',()=> shopWarkop());
  addB(42,19,6,4,[60,100,200],'WARNET',()=> shopWarnet());
  addB(52,19,5,4,[180,120,60],'CAFE',()=> shopCafe());
  addB(22,27,5,4,[200,180,100],'TOKO BUKU',()=> shopBuku());
  addB(32,27,5,4,[180,100,60],'VERMAK LEVIS',()=> shopVermak());
  addB(42,27,5,4,[220,100,180],'TOKO BAJU',()=> shopCloth());
  addB(52,27,5,4,[60,120,220],'KANTOR DEV',()=> shopDev());
  addB(62,27,5,4,[200,60,100],'MINI MARKET',()=> shopMM());

let actx=null;
function initAudio(){if(!actx)try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function sfx(freq,dur,type,vol,delay){
  try{
    initAudio();
    if(!actx)return;
    const t=actx.currentTime+(delay||0);
    const o=actx.createOscillator(),g=actx.createGain();
    o.type=type||'square';o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(vol||.06,t);
    g.gain.exponentialRampToValueAtTime(.001,t+(dur||.1));
    o.connect(g);g.connect(actx.destination);
    o.start(t);o.stop(t+(dur||.1));
  }catch(e){}
}
function sfxStep(){if(G.stepSfx++%4===0)sfx(180+Math.random()*80,.05,'square',.025);}

function spawnNPCs(){
  const used=[];
  NPC_DATA.forEach((nd,i)=> {
    let x,y,ok;
    for(let a=0;a<50;a++){
      x=5+Math.random()*(C.W-10)|0;y=5+Math.random()*(C.H-10)|0;
      ok=!isWall(x,y)&&MAP[y]?.[x]!==5;
      BLD.forEach(b=> {if(x>=b.x&&x<b.x+b.w&&y>=b.y&&y<b.y+b.h)ok=false;});
      used.forEach(u=> {if(Math.abs(x-u.x)<5&&Math.abs(y-u.y)<5)ok=false;});
      if(ok)break;
    }
    if(!ok){x=10+i*3;y=10;}
    used.push({x,y});
    NPCS.push({
      id:i,n:nd.n,c:nd.c,hc:nd.hc,t:nd.t,d:nd.d,
      x,y,tx:x,ty:y,st:'p',pt:1+Math.random()*3,spd:.5+Math.random()*.5,fr:0,
      at:-1,meetT:0,// meeting state
    });
  });
}
// ===== RENDER (Top-Down Neon) =====
function render(){
  const w=C.WW,h=C.HH,tw=C.T,tn=Date.now(),ta=tn*.001;
  const camX=G.px-Math.floor(w/tw/2),camY=G.py-Math.floor(h/tw/2);
  const sky=tn*.00005,sb=Math.sin(sky)*.5+.5,lt=.6+sb*.3;
  const sx=Math.max(0,-camX),sy=Math.max(0,-camY);
  const ex=Math.min(C.W,camX+Math.ceil(w/tw)+2),ey=Math.min(C.H,camY+Math.ceil(h/tw)+2);
  // Background: horror pink and midnight blue
  const grdBg=cx.createLinearGradient(0,0,w,h);
  grdBg.addColorStop(0,'#020212');
  grdBg.addColorStop(0.5,'#40082c');
  grdBg.addColorStop(1,'#06021a');
  cx.fillStyle=grdBg;cx.fillRect(0,0,w,h);
  // Tiles
  for(let y=sy;y<ey;y++)for(let x=sx;x<ex;x++){
    const dx=(x-camX)*tw,dy=(y-camY)*tw;
    if(dx<-tw||dx>w+tw||dy<-tw||dy>h+tw)continue;
    const t=MAP[y]?.[x]??0;
    let r,g,b;
    if(t===0){r=12+lt*10;g=45+lt*18;b=18+lt*5;}
    else if(t===1){r=100+lt*10;g=80+lt*8;b=50+lt*5;}
    else if(t===2){r=160-lt*20;g=130-lt*10;b=70+lt*5;}
    else if(t===3){const wv=Math.sin(x*2+ta)*.08+.92;r=20*wv+5;g=60*wv+5;b=150*wv;}

function floorColor(t,isFloor){
  // Extra dark scaling for ground/ceiling
  const d=isFloor?.35:.15;
  switch(t){
    case 0:return[15*d|0,55*d|0,18*d|0];
    case 1:return[100*d|0,80*d|0,50*d|0];
    case 2:return[160*d|0,130*d|0,70*d|0];
    case 3:return[20*d|0,55*d|0,130*d|0];
    case 4:return[60*d|0,30*d|0,160*d|0];
    case 5:return[55*d|0,50*d|0,55*d|0];
    case 7:return[20*d|0,70*d|0,16*d|0];
    default:return[35*d|0,30*d|0,50*d|0];
  }
}
function drawWallTex(x,y,w,h,r,ta){
  let R,G,B;
  if(r.bld){R=r.bld.c[0];G=r.bld.c[1];B=r.bld.c[2];}
  else if(r.tile===4){R=60;G=30;B=160;}else if(r.tile===5){R=55;G=50;B=55;}
  else if(r.tile===3){R=20;G=55;B=130;}else{R=40;G=38;B=60;}
  if(r.side){R*=0.7;G*=0.7;B*=0.7;}
  // Gloomy building walls: multiply by 0.4
  R*=0.4; G*=0.4; B*=0.4;
  const sd=Math.max(.15,Math.min(0.65,2.5/r.dist));
  R*=sd;G*=sd;B*=sd;
  cx.fillStyle=C2(R|0,G|0,B|0);cx.fillRect(x,y,w,h);
}

function shootPistol(){
  if(G.mode!=='fps')return;
  if(G.shootT>0)return;
  G.shootT=0.25;
  sfx(120,0.15,'triangle',0.18);
  sfx(800,0.05,'sawtooth',0.1);
  let hitNpc=null;
  NPCS.forEach(n=> {
    const dx=n.x-G.px,dy=n.y-G.py;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<0.5||dist>15)return;
    const ang=Math.atan2(dy,dx);
    let diff=ang-G.angle;
    while(diff>Math.PI)diff-=2*Math.PI;
    while(diff<-Math.PI)diff+=2*Math.PI;
    if(Math.abs(diff)<0.08){
      const rc=castRay(G.angle+diff);
      if(!rc||rc.dist>dist){
        if(!hitNpc||dist<hitNpc.dist){
          hitNpc={npc:n,dist};
        }
      }
    }
  });
  if(hitNpc){
    sfx(200,0.1,'sawtooth',0.15);
    notif('ðŸŽ¯ TERKENA!',`Kamu menembak ${hitNpc.npc.n}!`);
  }
}

// ===== NPC UPDATE =====
function updateNPCs(){
  if(G.devMode){
    if(!G.devLinePos){
      const fX=Math.cos(G.angle),fY=Math.sin(G.angle);
      const rX=-Math.sin(G.angle),rY=Math.cos(G.angle);
      G.devLinePos={
        x:G.px+3.5*fX,
        y:G.py+3.5*fY,
        rx:rX,
        ry:rY
      };
    }
    NPCS.forEach((n,idx)=> {
      const offset=(idx-(NPCS.length-1)/2)*1.1;
      n.tx=G.devLinePos.x+offset*G.devLinePos.rx;
      n.ty=G.devLinePos.y+offset*G.devLinePos.ry;
      const dx=n.tx-n.x,dy=n.ty-n.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d>0.15){
        const sp=4.5*G.dt;
        n.x+=(dx/d)*sp;n.y+=(dy/d)*sp;
      }
    });
    G.devTimer-=G.dt;
    if(G.devTimer<=0){
      G.devMode=false;
      G.devLinePos=null;
      closeDlg();
      NPCS.forEach(n=> {
        n.st='w';
        n.spd=0.5+Math.random()*0.5;
        n.tx=5+Math.random()*(C.W-10);
        n.ty=5+Math.random()*(C.H-10);
        n.pt=1+Math.random()*3;
      });
      notif('ðŸƒ NPC BUBAR!','NPC kembali menyebar...');
    }
    return;
  }
  NPCS.forEach(n=> {
    if(n===G.npcI)return;
    // Meeting state â€” NPC diam sambil ngobrol
    if(n.at>=0){
      n.meetT-=G.dt||.016;
      if(n.meetT<=0){n.at=-1;n.st='p';n.pt=2+Math.random()*4;}
      return;
    }
    n.pt-=G.dt||.016;
    if(n.st==='w'){
      const dx=n.tx-n.x,dy=n.ty-n.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d>.3){
        const sp=n.spd*(G.dt||.016);
        n.x+=Math.sign(dx)*sp;n.y+=Math.sign(dy)*sp;
      }else{
        // Sampai tujuan â€” cek apakah di meet point
        const mi=MEET_PTS.findIndex(m=> Math.abs(n.x-m.x)<1.5&&Math.abs(n.y-m.y)<1.5);
        if(mi>=0){
          const others=NPCS.filter(o=> o!==n&&o.at===mi);
          if(others.length>0||Math.random()<.3){
            n.at=mi;n.meetT=3+Math.random()*5;
          }else{n.st='p';n.pt=.5+Math.random()*2;}
        }else{n.st='p';n.pt=1+Math.random()*4;}
      }
    }else if(n.pt<=0){
      n.st='w';
      // 25% chance pergi ke meet point
      if(Math.random()<.25&&MEET_PTS.length>0){
        const mp=MEET_PTS[Math.random()*MEET_PTS.length|0];
        n.tx=mp.x;n.ty=mp.y;
      }else{
        for(let a=0;a<10;a++){
          n.tx=5+Math.random()*(C.W-10);n.ty=5+Math.random()*(C.H-10);
          if(!isWall(n.tx|0,n.ty|0)&&MAP[n.ty|0]?.[n.tx|0]!==6)break;
        }
      }
      n.pt=0;
    }
  });
}
// ===== DIALOGUE =====
function startDlg(npc){
  sfxInteract();G.npcI=npc;G.dlg=0;
  // Inject gossip jika NPC sedang di meet point dengan NPC lain
  if(npc.at>=0&&npc.d[0]&&npc.d[0].o){
    const others=NPCS.filter(o=> o!==npc&&o.at===npc.at);
    if(others.length>0){
      const rumor=RUMORS[Math.random()*RUMORS.length|0];
      npc.d.unshift({q:'(Ngobrol)',a:'Eh ada yang baru!',o:[
        {t:'Denger gossip!',r:()=> rumor},
        {t:`Sama ${others[0].n}?`,r:()=> `Iya, kami lagi ngobrol. ${rumor}`},
        {t:'Lanjutkan!',r:()=> 'Hehe, iya. Makasih udah nyapa!'},
      ]});
    }
  }
  showDlg(npc);
}
function showDlg(npc){
  const d=npc.d[G.dlg%npc.d.length];

  document.getElementById('dt').textContent=d.a;
  const opts=document.getElementById('dopt');
  opts.innerHTML=d.o.map((o,i)=> `<button data-oi="${i}">${o.t}</button>`).join('')+
    '<button class="d-next" id="dnext">â–¸ Lanjut</button>';
  opts.querySelectorAll('button[data-oi]').forEach(b=> {
    b.onclick=()=> {
      const oi=parseInt(b.dataset.oi);
      const resp=d.o[oi].r();
      document.getElementById('dt').textContent=resp;
      document.getElementById('dopt').innerHTML='<button class="d-next" id="dnext2">â–¸ Tutup</button>';
      document.getElementById('dnext2').onclick=()=> closeDlg();

    G.dlg=(G.dlg+1)%npc.d.length;

  };
  document.getElementById('diabox').classList.add('show');
}
function closeDlg(){
  document.getElementById('diabox').classList.remove('show');

}
// ===== INTERACTION =====
function interact(){
  if(G.npcI){closeDlg();return;}
  const near=NPCS.find(n=> Math.abs(n.x-G.px)<3&&Math.abs(n.y-G.py)<3);
  if(near){startDlg(near);return;}
  const nearB=BLD.find(b=> Math.abs(b.x+b.w/2-G.px)<3.5&&Math.abs(b.y+b.h/2-G.py)<3.5);
  if(nearB&&nearB.fn){sfxInteract();nearB.fn();return;}
  notif('ðŸ¤·','Tidak ada interaksi');
}

function panel(t,html,fn,fb,fc,fx){

function initTD(){try{G.td=JSON.parse(localStorage.getItem('pTD')||'[]');}catch(e){}renderKB();}
function addTD(){
  const i=document.getElementById('tdi'),t=i.value.trim();if(!t)return;
  G.td.push({id:Date.now(),text:t,status:'planning'});i.value='';saveTD();renderKB();
}
function mvTD(id,st){
  const t=G.td.find(x=> x.id===id);if(!t)return;
  if(st==='done')t.status='done';
  else if(st==='fail')t.status='fail';
  else if(st==='planning')t.status='planning';
  else if(st==='progress')t.status='progress';
  saveTD();renderKB();
}
function delTD(id){G.td=G.td.filter(t=> t.id!==id);saveTD();renderKB();}
function saveTD(){localStorage.setItem('pTD',JSON.stringify(G.td));}
function renderKB(){
  const cols={planning:'kl-planning',progress:'kl-progress',done:'kl-done'};
  Object.keys(cols).forEach(k=> {
    const ul=document.getElementById(cols[k]);
    const items=G.td.filter(t=> t.status===k||(k==='done'&&(t.status==='done'||t.status==='fail')));
    if(!items.length){ul.innerHTML='<li class="ke">â€”</li>';return;}
    ul.innerHTML=items.map(t=> {
      const cls=t.status==='done'?'done':t.status==='fail'?'fail':'';
      let prev='',next='';
      if(t.status==='planning'){next='progress';}
      else if(t.status==='progress'){prev='planning';next='done';}
      else if(t.status==='done'){prev='progress';next='fail';}
      else if(t.status==='fail'){prev='done';}
      return `<li>
        <span class="kt ${cls}">${esc(t.text)}</span>
        <span class="km">
          ${prev?`<button class="kleft" data-mv="${t.id}:${prev}">â—€</button>`:''}
          ${next?`<button class="kright" data-mv="${t.id}:${next}">â–¶</button>`:''}
          <button class="kdel" data-del="${t.id}">âœ•</button>
        </span>
      </li>`;
    }).join('');
    ul.querySelectorAll('[data-mv]').forEach(b=> {
      const[id,st]=b.dataset.mv.split(':');
      b.onclick=()=> mvTD(+id,st);
    });
    ul.querySelectorAll('[data-del]').forEach(b=> {
      b.onclick=()=> delTD(+b.dataset.del);
    });
  });
}

// ===== GAME LOOP =====
let lt=0;
function loop(t){
  requestAnimationFrame(loop);
  G.dt=Math.min((t-lt)/1000,.05);lt=t;
  if(G.shootT>0)G.shootT-=G.dt;
  if(G.mode==='fps'){
    const spd=4.5*G.dt;
    const dx=Math.cos(G.angle),dy=Math.sin(G.angle);
    const sx=Math.cos(G.angle+Math.PI/2),sy=Math.sin(G.angle+Math.PI/2);
    let mvxF=0,mvyF=0;
    if(G.k['arrowleft']){G.angle-=.04;}
    if(G.k['arrowright']){G.angle+=.04;}
    if(G.k['w']){mvxF+=dx;mvyF+=dy;}
    if(G.k['s']){mvxF-=dx;mvyF-=dy;}
    if(G.k['a']){mvxF-=sx;mvyF-=sy;}
    if(G.k['d']){mvxF+=sx;mvyF+=sy;}
    if(mvxF||mvyF){
      const len=Math.sqrt(mvxF*mvxF+mvyF*mvyF);
      mvxF/=len;mvyF/=len;
      const nx=G.px+mvxF*spd,ny=G.py+mvyF*spd;
      if(!isWall(Math.floor(nx),Math.floor(G.py)))G.px=nx;
      if(!isWall(Math.floor(G.px),Math.floor(ny)))G.py=ny;
      G.px=Math.max(1,Math.min(C.W-2,G.px));
      G.py=Math.max(1,Math.min(C.H-2,G.py));
      G.fr+=G.dt*8;
      sfxStep();
    }
  }else{
    let mvx=0,mvy=0;
    if(G.k['w']||G.k['arrowup'])mvy=-1;
    if(G.k['s']||G.k['arrowdown'])mvy=1;
    if(G.k['a']||G.k['arrowleft'])mvx=-1;
    if(G.k['d']||G.k['arrowright'])mvx=1;
    if(G.dpd){
      if(G.dpd==='u')mvy=-1;if(G.dpd==='d')mvy=1;
      if(G.dpd==='l')mvx=-1;if(G.dpd==='r')mvx=1;
    }
    if(mvx||mvy){
      const len=Math.sqrt(mvx*mvx+mvy*mvy);
      mvx/=len;mvy/=len;
      const spd=G.k['shift']?3.5:G.spd;
      const sp=spd*G.dt;
      const nx=G.px+mvx*sp,ny=G.py+mvy*sp;
      if(!isWall(Math.floor(nx),Math.floor(G.py)))G.px=nx;
      if(!isWall(Math.floor(G.px),Math.floor(ny)))G.py=ny;
      G.px=Math.max(1,Math.min(C.W-2,G.px));
      G.py=Math.max(1,Math.min(C.H-2,G.py));
      G.fr+=G.dt*6;
      sfxStep();
    }
  }
  // Passive score
  G.scoreRate=1+G.lv*.5+G.sk*.2;
  G.score+=G.scoreRate*G.scoreMul*G.dt;
  // Time & weather
  const now=new Date();
  const jk=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Jakarta'}));
  document.getElementById('sclk').textContent=
    String(jk.getHours()).padStart(2,'0')+':'+String(jk.getMinutes()).padStart(2,'0')+' WIB';
  const ic={cloudy:'â˜ï¸',rainy:'ðŸŒ§ï¸'};
  document.getElementById('swth').textContent=ic[G.w||'']||'â˜€ï¸';
  updateNPCs();
  if(G.mode==='fps')renderFPS();else render();
}
